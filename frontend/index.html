<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro-Analytics Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader-overlay" class="loader-overlay hidden">
        <div class="loader"></div>
        <p>Analyzing Environmental Indicators...</p>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <h1><i class="fa-solid fa-droplet"></i> Hydro-Analytics Pro</h1>
                <p>Digital Biomimicry for Groundwater Detection</p>
            </div>
            <div class="search-area">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-bar" placeholder="Filter by District or Station...">
            </div>
        </header>

        <main>
            <section id="prediction-output" class="prediction-section hidden">
                <div class="glass-card">
                    <div class="card-header">
                        <h2 id="res-location">Location</h2>
                        <span class="badge">Live Analysis</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat"><span>Water Table</span><h3 id="res-level">--</h3></div>
                        <div class="stat"><span>WPI Score</span><h3 id="res-wpi">--</h3></div>
                        <div class="stat"><span>Rel. Humidity</span><h3 id="res-hum">--</h3></div>
                        <div class="stat"><span>Surface Temp</span><h3 id="res-temp">--</h3></div>
                    <!-- </div>
                    <div class="alert-box">
                        <strong>Outcome:</strong> <span id="res-suggest">--</span>
                    </div> -->
                </div>
            </section>

            <section class="grid-section">
                <h3>All India Stations (From CGWB Database)</h3>
                <div id="station-list" class="station-grid">
                    </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
